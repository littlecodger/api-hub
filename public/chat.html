<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI Chat - 智能助手</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #212121; color: #e4e4e7; height: 100vh; display: flex; flex-direction: column; }
  
  /* 顶部栏 */
  .topbar { background: #171717; border-bottom: 1px solid #2f2f2f; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .topbar-left { display: flex; align-items: center; gap: 10px; }
  .topbar h1 { font-size: 16px; font-weight: 600; background: linear-gradient(135deg, #6366f1, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .model-select { background: #2f2f2f; border: 1px solid #404040; border-radius: 6px; padding: 6px 10px; color: #e4e4e7; font-size: 13px; cursor: pointer; }
  .balance-badge { background: #1a3a1a; color: #4ade80; padding: 4px 10px; border-radius: 12px; font-size: 12px; }

  /* 聊天区域 */
  .chat-area { flex: 1; overflow-y: auto; padding: 20px; max-width: 800px; margin: 0 auto; width: 100%; }
  .message { display: flex; gap: 12px; margin-bottom: 24px; }
  .message.user { flex-direction: row-reverse; }
  .avatar { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .avatar.assistant { background: linear-gradient(135deg, #6366f1, #a855f7); }
  .avatar.user { background: #2f2f2f; }
  .bubble { max-width: 80%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.6; }
  .bubble.assistant { background: #2f2f2f; border: 1px solid #3f3f3f; }
  .bubble.user { background: #6366f1; color: white; }
  .bubble .time { font-size: 11px; color: #71717a; margin-top: 4px; }

  /* 输入区域 */
  .input-area { border-top: 1px solid #2f2f2f; padding: 16px 20px; background: #171717; flex-shrink: 0; }
  .input-wrap { max-width: 800px; margin: 0 auto; display: flex; gap: 8px; align-items: flex-end; }
  .input-wrap textarea { flex: 1; background: #2f2f2f; border: 1px solid #404040; border-radius: 12px; padding: 12px 16px; color: #e4e4e7; font-size: 14px; resize: none; min-height: 48px; max-height: 120px; outline: none; font-family: inherit; }
  .input-wrap textarea:focus { border-color: #6366f1; }
  .send-btn { background: linear-gradient(135deg, #6366f1, #a855f7); border: none; border-radius: 12px; width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; font-size: 20px; }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* 欢迎页面 */
  .welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; padding: 40px; }
  .welcome .logo { font-size: 64px; margin-bottom: 16px; }
  .welcome h2 { font-size: 24px; margin-bottom: 8px; }
  .welcome p { color: #71717a; font-size: 14px; max-width: 400px; line-height: 1.6; }

  /* 打字指示器 */
  .typing { display: inline-flex; gap: 4px; padding: 4px 0; }
  .typing span { width: 8px; height: 8px; border-radius: 50%; background: #71717a; animation: bounce 1.4s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-4px); } }

  /* 移动端适配 */
  @media (max-width: 600px) {
    .chat-area { padding: 12px; }
    .bubble { max-width: 90%; font-size: 15px; }
    .topbar { padding: 10px 12px; }
    .input-area { padding: 12px; }
  }
</style>
</head>
<body>

<!-- 顶部栏 -->
<div class="topbar">
  <div class="topbar-left">
    <h1>🤖 AI Chat</h1>
    <select class="model-select" id="modelSelect">
      <option value="deepseek-v4-flash">DeepSeek V4 Flash</option>
      <option value="deepseek-v4-pro">DeepSeek V4 Pro</option>
    </select>
  </div>
  <div>
    <span class="balance-badge" id="balanceBadge">💰 ¥0.00</span>
  </div>
</div>

<!-- 聊天区域 -->
<div class="chat-area" id="chatArea">
  <div class="welcome" id="welcomeScreen">
    <div class="logo">🤖</div>
    <h2>有什么我可以帮你的？</h2>
    <p>支持 DeepSeek、GPT、Claude 等多种模型。在下方输入你的问题，开始对话吧！</p>
  </div>
</div>

<!-- 输入区域 -->
<div class="input-area">
  <div class="input-wrap">
    <textarea id="messageInput" placeholder="输入消息..." rows="1" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
const API_BASE = '/api'; // 部署时修改为实际地址
let apiKey = localStorage.getItem('api_key') || '';
let messages = [];

// 自动调整输入框高度
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// 发送消息
async function sendMessage() {
  const input = document.getElementById('messageInput');
  const text = input.value.trim();
  if (!text) return;

  // 隐藏欢迎页
  document.getElementById('welcomeScreen')?.remove();
  
  // 添加用户消息
  addMessage('user', text);
  input.value = '';
  autoResize(input);
  
  // 显示打字指示
  const typingId = showTyping();
  
  // 收集对话历史
  const chatMessages = messages.map(m => ({ role: m.role, content: m.text }));
  chatMessages.push({ role: 'user', content: text });
  
  try {
    const model = document.getElementById('modelSelect').value;
    const key = apiKey || prompt('请输入API Key（没有请联系管理员获取）');
    if (key) {
      apiKey = key;
      localStorage.setItem('api_key', key);
    }
    
    if (!apiKey) {
      removeTyping(typingId);
      addMessage('assistant', '❌ 请先设置API Key');
      return;
    }
    
    const resp = await fetch(API_BASE + '/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
      body: JSON.stringify({ model, messages: chatMessages }),
    });
    
    const data = await resp.json();
    removeTyping(typingId);
    
    if (resp.ok && data.choices?.[0]?.message?.content) {
      const reply = data.choices[0].message.content;
      addMessage('assistant', reply);
      
      // 更新余额
      if (data.usage?.balance_after) {
        document.getElementById('balanceBadge').textContent = '💰 ¥' + parseFloat(data.usage.balance_after).toFixed(2);
      }
    } else {
      addMessage('assistant', '❌ ' + (data.error?.message || '请求失败'));
    }
  } catch(e) {
    removeTyping(typingId);
    addMessage('assistant', '❌ 网络错误: ' + e.message);
  }
  
  // 滚动到底部
  document.getElementById('chatArea').scrollTop = document.getElementById('chatArea').scrollHeight;
}

// 添加消息到聊天区域
function addMessage(role, text) {
  messages.push({ role, text });
  
  const chatArea = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = 'message ' + role;
  div.innerHTML = `
    <div class="avatar ${role}">${role === 'assistant' ? '🤖' : '👤'}</div>
    <div class="bubble ${role}">
      ${text.replace(/\n/g, '<br>')}
    </div>
  `;
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}

// 显示打字指示器
function showTyping() {
  const id = 'typing-' + Date.now();
  const chatArea = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = 'message assistant';
  div.id = id;
  div.innerHTML = `
    <div class="avatar assistant">🤖</div>
    <div class="bubble assistant">
      <div class="typing"><span></span><span></span><span></span></div>
    </div>
  `;
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
  return id;
}
function removeTyping(id) {
  document.getElementById(id)?.remove();
}

// 回车发送
document.getElementById('messageInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
</script>
</body>
</html>
